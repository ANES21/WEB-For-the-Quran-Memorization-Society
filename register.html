<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - جمعية المعالي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4 space-x-reverse">
                <img src="img/lego.jpeg" alt="شعار الجمعية" class="h-12 w-12 rounded-full border-2 border-white object-cover">
                <span class="text-xl md:text-2xl font-bold">جمعية المعالي للعلوم والتربية - مكتب ملاكـــــــو</span>
            </div>
            <div>
                <a href="login.html" class="text-white hover:underline text-sm font-semibold">لديك حساب؟ سجل دخولك</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center container mx-auto px-4 py-8">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md">
            
            <div class="text-center mb-6">
                 <h2 class="text-2xl font-bold text-gray-800">إنشاء حساب جديد</h2>
                 <p class="text-xs text-gray-500 mt-1">الانضمام إلى المنصة الرقمية لمكتب ملاكو</p>
             </div>

            <form id="registerForm" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-600">* الاسم الكامل</label>
                    <input type="text" id="name" required placeholder="الاسم الثلاثي" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-600">* البريد الإلكتروني</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-gray-600">* العمر</label>
                        <input type="number" id="age" required min="5" max="90" placeholder="18" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1 text-gray-600">* نوع الحساب</label>
                        <select id="role" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white transition duration-150">
                            <option value="Student">طالب</option>
                            <option value="Teacher">معلم حلقة</option>
                            <option value="Cashier">أمين صندوق</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-600">* كلمة المرور</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                </div>

                <div id="statusMessage" class="hidden text-sm p-3 rounded-xl border"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-200">
                    تسجيل الحساب وحفظ البيانات
                </button>
            </form>

            <div class="text-center mt-6 pt-4 border-t border-gray-100 text-sm text-gray-600">
                لديك حساب بالفعل؟ 
                <a href="login.html" class="text-blue-600 font-bold hover:underline">سجل الدخول هنا</a>
            </div>

        </div>
    </main>
 
    <footer class="bg-white border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        <p>جميع الحقوق محفوظة © جمعية المعالي للعلوم والتربية - مكتب ملاكو 2026</p>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const age = parseInt(document.getElementById('age').value);
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            
            const statusDiv = document.getElementById('statusMessage');
            const submitBtn = document.getElementById('submitBtn');

            // إعداد حالة التحميل
            statusDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري إنشاء الحساب...";

            try {
                // ملاحظة: ستحتاج لإضافة مسار الترحيب والتسجيل البرمجي /api/register في الـ Node js لاحقاً لاستقبال هذه البيانات
                const response = await fetch('http://localhost:8080/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, age, role, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'فشلت عملية إنشاء الحساب');
                }

                // نجاح التسجيل
                statusDiv.className = "text-sm p-3 rounded-xl border bg-green-50 text-green-600 border-green-100";
                statusDiv.innerText = "تم إنشاء الحساب بنجاح! سيتم توجيهك لصفحة تسجيل الدخول...";
                statusDiv.classList.remove('hidden');

                // تحويل المستخدم إلى صفحة تسجيل الدخول بعد ثانيتين
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                // فشل التسجيل وعرض الخطأ
                statusDiv.className = "text-sm p-3 rounded-xl border bg-red-50 text-red-600 border-red-100";
                statusDiv.innerText = error.message;
                statusDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = "تسجيل الحساب وحفظ البيانات";
            }
        });
    </script>

</body>
</html>
