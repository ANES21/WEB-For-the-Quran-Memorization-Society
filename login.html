<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - جمعية المعالي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4 space-x-reverse">
                <img src="img/lego.jpeg" alt="شعار الجمعية" class="h-12 w-12 rounded-full border-2 border-white object-cover">
                <span class="text-xl md:text-2xl font-bold">جمعية المعالي للعلوم والتربية - مكتب ملاكـــــــو</span>
            </div>
            <div>
                <a href="main.html" class="text-white hover:underline text-sm font-semibold">العودة للرئيسية</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center container mx-auto px-4 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md">
            
            <div class="text-center mb-8">
                 <h2 class="text-2xl font-bold text-gray-800">بوابة تسجيل الدخول</h2>
                 <p class="text-xs text-gray-500 mt-1">الربط البرمجي عبر خادم Node.js و Supabase</p>
             </div>

            <form id="loginForm" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-gray-600">* البريد الإلكتروني</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-sm font-semibold text-gray-600">* كلمة المرور</label>
                        <a href="forgot-password.html" class="text-xs text-blue-600 hover:underline">نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-150">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember" class="mr-2 block text-sm text-gray-600 select-none cursor-pointer">تذكرني على هذا الجهاز</label>
                </div>

                <div id="errorMessage" class="hidden text-sm bg-red-50 text-red-600 p-3 rounded-xl border border-red-100"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-200">
                    دخول المنصة
                </button>
            </form>

            <div class="text-center mt-6 pt-5 border-t border-gray-100 text-sm text-gray-600">
                ليس لديك حساب بعد؟ 
                <a href="register.html" class="text-blue-600 font-bold hover:underline">أنشئ حسابك الآن</a>
            </div>

        </div>
    </main>
 
    <footer class="bg-white border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        <p>جميع الحقوق محفوظة © جمعية المعالي للعلوم والتربية - مكتب ملاكو 2026</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري التحقق...";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'حدث خطأ أثناء تسجيل الدخول');
                }

                // حفظ التوكن وبيانات المستخدم بشكل صحيح
                localStorage.setItem('supabase_token', data.token);
                localStorage.setItem('user_profile', JSON.stringify(data.user));

                alert(data.message);

                // تحويل الدور لنصوص صغيرة لتجنب أخطاء أحرف الكابيتل
                const role = (data.user.role || '').toLowerCase();
                
                if (role === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else if (role === 'student') {
                    window.location.href = 'student_dashboard.html';
                } else if (role === 'teacher') {
                    window.location.href = 'teacher_dashboard.html';
                } else if (role === 'cashier') {
                    window.location.href = 'cashier_dashboard.html';
                } else {
                    throw new Error('نوع الحساب غير معروف أو غير مصرح له بالدخول');
                }

            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "دخول المنصة";
            }
        });
    </script>
</body>
</html>
